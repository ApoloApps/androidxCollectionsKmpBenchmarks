name: Benchmarks

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  benchmark:
    name: benchmark (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run benchmarks (Unix)
        if: runner.os != 'Windows'
        run: ./gradlew :collectionsBenchmarks:benchmark --no-daemon --stacktrace

      - name: Run benchmarks (Windows)
        if: runner.os == 'Windows'
        run: .\gradlew.bat :collectionsBenchmarks:benchmark --no-daemon --stacktrace

