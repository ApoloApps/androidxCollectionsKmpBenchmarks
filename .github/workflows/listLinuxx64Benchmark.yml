name: List Native Linux x64 Benchmarks

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  pull_request:
  

permissions:
  contents: read

jobs:
  benchmark:
    name: List Native Linux x64 Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run benchmarks
        run: ./gradlew :collectionsBenchmarks:linuxX64Benchmark --no-daemon --stacktrace


