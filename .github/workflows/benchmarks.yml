name: Collections Benchmarks

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

# Cancel previous in-flight runs for the same branch / PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: ${{ matrix.target.label }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          # JVM benchmarks — JMH is happy on either arch but the arm runners are faster + free.
          - id: jvm
            label: Desktop / JVM
            runner: ubuntu-24.04-arm
            gradle-task: ":collectionsBenchmarks:jvmBenchmark"

          # JS (Node) — needs no native toolchain, runs on arm.
          - id: js
            label: Kotlin/JS (Node)
            runner: ubuntu-24.04-arm
            gradle-task: ":collectionsBenchmarks:jsBenchmark"

          # Wasm/JS (Node) — same as JS.
          - id: wasmJs
            label: Kotlin/Wasm (Node)
            runner: ubuntu-24.04-arm
            gradle-task: ":collectionsBenchmarks:wasmJsBenchmark"

          # Native Linux x64 — module's build.gradle.kts only registers the linuxX64 target on
          # amd64 hosts, so this job MUST stay on x86_64 to compile and link.
          - id: linuxX64
            label: Native Linux x64
            runner: ubuntu-latest
            gradle-task: ":collectionsBenchmarks:linuxX64Benchmark"

          # Native iOS (arm64) — builds the binary only, execution requires a physical device.
          - id: iosArm64
            label: Native iOS (arm64)
            runner: macos-latest
            gradle-task: ":collectionsBenchmarks:iosArm64Binaries"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Run ${{ matrix.target.label }} benchmarks
        run: ./gradlew ${{ matrix.target.gradle-task }} --no-daemon --stacktrace

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.target.id }}
          path: |
            collectionsBenchmarks/build/reports/benchmarks/**
            collectionsBenchmarks/build/benchmarks/**
            collectionsBenchmarks/build/bin/**
          if-no-files-found: ignore
          retention-days: 14
